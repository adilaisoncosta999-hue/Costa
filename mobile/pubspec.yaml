name: cwm_mobile
description: "Costa Workforce Manager - App de marcação de presença por QR Code"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Rede
  http: ^1.2.1

  # Armazenamento local (token de login, dados em cache)
  shared_preferences: ^2.2.3

  # Scanner de QR Code (usa a câmara do telemóvel)
  mobile_scanner: ^5.1.1

  # Geolocalização (GPS no momento da marcação)
  geolocator: ^12.0.0

  # Formatação de datas/horas
  intl: ^0.19.0

  # Ícones e UI
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
